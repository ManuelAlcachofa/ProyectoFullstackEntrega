spring.application.name=resena-service
server.port=9097

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_biblioteca_resenas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.liquibase.enabled=false

services.libro.url=http://api-gateway:9090
services.usuario.url=http://api-gateway:9090

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html


